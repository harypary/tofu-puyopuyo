workflows:
  unity-ios:
    name: Unity iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    cache:
      cache_paths:
        - /Applications/Unity
        - ~/.cocoapods

    environment:
      groups:
        - unity_credentials
        - ios_credentials
      vars:
        UNITY_VERSION: "6000.3.10f1"
        UNITY_CHANGESET: "e35f0c77bd8e"
        BUNDLE_ID: "com.harypary.tofupuyopuyo"
        XCODE_SCHEME: "Unity-iPhone"

    scripts:
      - name: Install Unity Editor
        script: |
          UNITY_BIN=$(find /Applications -name "Unity" -type f 2>/dev/null | head -1)
          if [ -n "$UNITY_BIN" ]; then
            echo "Unity already installed (cached): $UNITY_BIN"
          else
            echo "Downloading Unity $UNITY_VERSION..."
            curl -L "https://download.unity3d.com/download_unity/$UNITY_CHANGESET/MacEditorInstaller/Unity.pkg" \
              -o /tmp/Unity.pkg
            sudo installer -package /tmp/Unity.pkg -target /
            echo "Downloading iOS Support..."
            curl -L "https://download.unity3d.com/download_unity/$UNITY_CHANGESET/MacEditorTargetInstaller/UnitySetup-iOS-Support-for-Editor-$UNITY_VERSION.pkg" \
              -o /tmp/iOSSupport.pkg
            sudo installer -package /tmp/iOSSupport.pkg -target /
            UNITY_BIN=$(find /Applications -name "Unity" -type f 2>/dev/null | head -1)
            echo "Unity found at: $UNITY_BIN"
            test -n "$UNITY_BIN" && echo "Unity installed OK" || (echo "Unity NOT found" && exit 1)
          fi

      - name: Activate Unity License
        script: |
          ULC=$(find /Applications -name "Unity.Licensing.Client" -type f 2>/dev/null | head -1)
          echo "Licensing client: $ULC"
          if [ -z "$ULC" ]; then echo "ERROR: Unity.Licensing.Client not found" && exit 1; fi
          "$ULC" --activate-ulf \
            --username "$UNITY_USERNAME" \
            --password "$UNITY_PASSWORD" \
            2>&1 | tee /tmp/unity_ulc.log

      - name: Build Unity iOS project
        script: |
          UNITY_BIN=$(find /Applications -name "Unity" -type f 2>/dev/null | head -1)
          echo "Using Unity at: $UNITY_BIN"
          "$UNITY_BIN" \
            -batchmode -quit -nographics \
            -logFile /tmp/unity_build.log \
            -projectPath "$CM_BUILD_DIR" \
            -buildTarget iOS \
            -executeMethod BuildScript.BuildIOS
          cat /tmp/unity_build.log || true
          PBXPROJ="$CM_BUILD_DIR/Builds/iOS/Unity-iPhone.xcodeproj/project.pbxproj"
          test -f "$PBXPROJ" || (echo "xcodeproj not found" && exit 1)
          echo "xcodeproj generated OK"

      - name: Install CocoaPods dependencies
        script: |
          cd "$CM_BUILD_DIR/Builds/iOS"
          # Disable signing for all Pod targets via post_install hook
          printf '\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\n    end\n  end\nend\n' >> Podfile
          echo "post_install hook added to Podfile"
          pod install --no-repo-update
          echo "Pods installed"
          ls -la

      - name: Set up code signing
        script: |
          echo "$CM_CERTIFICATE" | base64 -d > /tmp/cert.p12
          echo "$CM_PROVISIONING_PROFILE" | base64 -d > /tmp/profile.mobileprovision

          # Install provisioning profile by UUID
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"
          echo "$PROFILE_UUID" > /tmp/profile_uuid.txt
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision

          # Method 1: Codemagic keychain tool
          keychain initialize || true
          keychain add-certificates \
            --certificate /tmp/cert.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD" || true

          # Method 2: Direct import as fallback (-A = allow all apps to use the key)
          security import /tmp/cert.p12 \
            -k ~/Library/Keychains/login.keychain-db \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild \
            -A || true
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" \
            ~/Library/Keychains/login.keychain-db 2>/dev/null || true

          # Verify — fail the build if no certificate found
          echo "--- Available signing identities ---"
          security find-identity -v -p codesigning
          if ! security find-identity -v -p codesigning | grep -q "Apple Distribution\|iPhone Distribution"; then
            echo "ERROR: Certificate import failed — no valid signing identities"
            exit 1
          fi
          echo "Certificate verified OK"

          # Update xcodeproj signing settings (try xcworkspace first, fall back to xcodeproj)
          IOS_DIR="$CM_BUILD_DIR/Builds/iOS"
          if [ -d "$IOS_DIR/Unity-iPhone.xcworkspace" ]; then
            xcode-project use-profiles \
              --workspace "$IOS_DIR/Unity-iPhone.xcworkspace" \
              --profile /tmp/profile.mobileprovision || true
          else
            echo "xcworkspace not found, using xcodeproj"
            xcode-project use-profiles \
              --project "$IOS_DIR/Unity-iPhone.xcodeproj" \
              --profile /tmp/profile.mobileprovision || true
          fi

          # Patch pbxproj signing settings
          PBXPROJ="$IOS_DIR/Unity-iPhone.xcodeproj/project.pbxproj"
          # CODE_SIGN_IDENTITY: force Apple Distribution (quoted and unquoted, with optional [sdk=...])
          perl -i -pe 's/CODE_SIGN_IDENTITY(\[.*?\])? = "[^"]+"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' "$PBXPROJ"
          perl -i -pe 's/"CODE_SIGN_IDENTITY(\[.*?\])?" = "[^"]+"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' "$PBXPROJ"
          # CODE_SIGN_STYLE: force Manual (handles both Automatic and "Automatic")
          perl -i -pe 's/CODE_SIGN_STYLE = "?Automatic"?;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          # DEVELOPMENT_TEAM: set for all targets (handles any existing value)
          perl -i -pe 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = 47BSX989JQ;/g' "$PBXPROJ"
          # PROVISIONING_PROFILE_SPECIFIER: delete ALL existing lines to avoid duplicates
          perl -i -pe '/PROVISIONING_PROFILE_SPECIFIER/d' "$PBXPROJ"
          # Diagnostic: show PRODUCT_BUNDLE_IDENTIFIER format in this project
          echo "--- PRODUCT_BUNDLE_IDENTIFIER lines ---"
          grep "PRODUCT_BUNDLE_IDENTIFIER" "$PBXPROJ" | head -5
          # Insert PROVISIONING_PROFILE_SPECIFIER only for the main app target (by bundle ID)
          PROFILE_UUID_CURR=$(cat /tmp/profile_uuid.txt)
          echo "Inserting PROVISIONING_PROFILE_SPECIFIER: $PROFILE_UUID_CURR"
          perl -i -0pe "s/(PRODUCT_BUNDLE_IDENTIFIER = \"?com\\.harypary\\.tofupuyopuyo\"?;)/\$1\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID_CURR\";/g" "$PBXPROJ"
          echo "--- PROVISIONING_PROFILE_SPECIFIER after patch ---"
          grep "PROVISIONING_PROFILE_SPECIFIER" "$PBXPROJ" | head -5
          echo "--- CODE_SIGN_STYLE after patch ---"
          grep "CODE_SIGN_STYLE" "$PBXPROJ" | head -5

          # Generate export_options.plist using python3 (same parser as xcode-project)
          PROFILE_UUID_VAL=$(cat /tmp/profile_uuid.txt)
          echo "Profile UUID for plist: $PROFILE_UUID_VAL"
          if [ -z "$PROFILE_UUID_VAL" ]; then echo "ERROR: UUID empty" && exit 1; fi
          PLIST="$CM_BUILD_DIR/export_options.plist"
          python3 -c "import plistlib,sys; d={'method':'app-store-connect','teamID':'47BSX989JQ','signingStyle':'manual','signingCertificate':'Apple Distribution','provisioningProfiles':{'com.harypary.tofupuyopuyo':sys.argv[1]}}; open(sys.argv[2],'wb').write(plistlib.dumps(d,fmt=plistlib.FMT_XML)); print('plist written')" "$PROFILE_UUID_VAL" "$PLIST"
          echo "--- export_options.plist content ---"
          cat "$PLIST"
          plutil -lint "$PLIST" && echo "plist OK" || (echo "plist INVALID" && exit 1)

      - name: Build IPA
        script: |
          PROFILE_UUID=$(cat /tmp/profile_uuid.txt)
          IOS_DIR="$CM_BUILD_DIR/Builds/iOS"
          ARCHIVE_PATH=/tmp/Unity-iPhone.xcarchive
          EXPORT_PATH=/tmp/ipa
          echo "Building IPA with profile UUID: $PROFILE_UUID"

          if [ -d "$IOS_DIR/Unity-iPhone.xcworkspace" ]; then
            WORKSPACE_ARG="-workspace $IOS_DIR/Unity-iPhone.xcworkspace"
          else
            echo "xcworkspace not found, using xcodeproj"
            WORKSPACE_ARG="-project $IOS_DIR/Unity-iPhone.xcodeproj"
          fi

          # Archive
          xcodebuild \
            $WORKSPACE_ARG \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="47BSX989JQ" \
            > /tmp/xcodebuild_archive.log 2>&1 \
            || (cat /tmp/xcodebuild_archive.log && echo "Archive failed" && exit 1)

          # Export IPA
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
            > /tmp/xcodebuild_export.log 2>&1 \
            || (cat /tmp/xcodebuild_export.log && echo "Export failed" && exit 1)

          echo "--- IPA files ---"
          ls -la "$EXPORT_PATH"

    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/unity_build.log
      - /tmp/unity_ulc.log
      - /tmp/xcodebuild_archive.log
      - /tmp/xcodebuild_export.log
