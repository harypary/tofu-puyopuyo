workflows:
  unity-ios:
    name: Unity iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      groups:
        - unity_credentials
        - ios_credentials
      vars:
        UNITY_VERSION: "6000.3.10f1"
        UNITY_CHANGESET: "e35f0c77bd8e"
        BUNDLE_ID: "com.harypary.tofupuyopuyo"
        XCODE_SCHEME: "Unity-iPhone"

    scripts:
      - name: Install Unity Editor
        script: |
          # ARM64 pkg not available for this version — use Intel (runs via Rosetta 2 on M2)
          echo "Downloading Unity $UNITY_VERSION (Intel/Rosetta2)..."
          curl -L "https://download.unity3d.com/download_unity/$UNITY_CHANGESET/MacEditorInstaller/Unity.pkg" \
            -o /tmp/Unity.pkg
          sudo installer -package /tmp/Unity.pkg -target /
          echo "Downloading iOS Support..."
          curl -L "https://download.unity3d.com/download_unity/$UNITY_CHANGESET/MacEditorTargetInstaller/UnitySetup-iOS-Support-for-Editor-$UNITY_VERSION.pkg" \
            -o /tmp/iOSSupport.pkg
          sudo installer -package /tmp/iOSSupport.pkg -target /

          # Confirm installation
          UNITY_BIN=$(find /Applications -name "Unity" -type f 2>/dev/null | head -1)
          echo "Unity found at: $UNITY_BIN"
          echo "--- Unity.app structure (top 3 levels) ---"
          find /Applications/Unity.app -maxdepth 4 -type f -name "*.Client" -o -name "Unity" 2>/dev/null | head -20
          test -n "$UNITY_BIN" && echo "Unity installed OK" || (echo "Unity NOT found" && exit 1)

      - name: Activate Unity License
        script: |
          UNITY_BIN=$(find /Applications -name "Unity" -type f 2>/dev/null | head -1)
          UNITY_APP=$(find /Applications -name "Unity.app" -type d 2>/dev/null | head -1)
          echo "Unity bin: $UNITY_BIN"
          echo "Unity app: $UNITY_APP"

          # Unity 6: Use the bundled Unity Licensing Client
          # Typically at: Unity.app/Contents/Frameworks/UnityLicensingClient_V1.app/Contents/MacOS/Unity.Licensing.Client
          ULC=$(find /Applications -name "Unity.Licensing.Client" -type f 2>/dev/null | head -1)
          echo "Licensing client: $ULC"
          echo "--- All Licensing.Client binaries found ---"
          find /Applications -name "*Licensing*" -type f 2>/dev/null || true

          if [ -n "$ULC" ]; then
            echo "--- Trying Unity Licensing Client (Unity 6 method) ---"
            "$ULC" --activate-ulf \
              --username "$UNITY_USERNAME" \
              --password "$UNITY_PASSWORD" \
              2>&1 | tee /tmp/unity_ulc.log || true
            cat /tmp/unity_ulc.log || true
          else
            echo "Licensing client not found inside Unity.app, falling back..."
            # Fallback: old username/password method
            "$UNITY_BIN" \
              -batchmode -quit -nographics \
              -logFile /tmp/unity_activate2.log \
              -username "$UNITY_USERNAME" \
              -password "$UNITY_PASSWORD" || true
            cat /tmp/unity_activate2.log || true
          fi

          # Show what license files were created
          find /Library/Application\ Support/Unity -name "*.ulf" 2>/dev/null || true
          find ~/Library/Application\ Support/Unity -name "*.ulf" 2>/dev/null || true

      - name: Build Unity iOS project
        script: |
          UNITY_BIN=$(find /Applications -name "Unity" -type f 2>/dev/null | head -1)
          echo "Using Unity at: $UNITY_BIN"
          "$UNITY_BIN" \
            -batchmode -quit -nographics \
            -logFile /tmp/unity_build.log \
            -projectPath "$CM_BUILD_DIR" \
            -buildTarget iOS \
            -executeMethod BuildScript.BuildIOS
          cat /tmp/unity_build.log || true

      - name: Set up code signing
        script: |
          echo "$CM_CERTIFICATE" | base64 -d > /tmp/cert.p12
          echo "$CM_PROVISIONING_PROFILE" | base64 -d > /tmp/profile.mobileprovision
          file /tmp/cert.p12
          file /tmp/profile.mobileprovision

          # Install provisioning profile by UUID (required for Xcode to find it)
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Profile installed"

          keychain initialize
          keychain add-certificates \
            --certificate /tmp/cert.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"
          xcode-project use-profiles --profile /tmp/profile.mobileprovision

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/Builds/iOS/Unity-iPhone.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --disable-xcpretty \
            --log-stream stderr

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/unity_build.log
      - /tmp/unity_activate2.log
      - /tmp/unity_ulc.log
